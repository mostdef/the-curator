<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Collection — Movies</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Oswald:wght@700&family=Playfair+Display:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <a href="movies.html" class="site-title">The Collection</a>
    <nav>
      <a href="settings.html" class="nav-link nav-link-settings">Settings</a>
    </nav>
  </header>

  <main>
    <div class="recommendation" id="recommendation"></div>
    <div class="grid-nav" id="grid-nav"></div>
    <div id="standards-wrap"></div>
    <div id="persona-wrap"></div>
    <div class="grid" id="grid-collection"></div>
    <div class="grid" id="grid-watchlist" style="display:none"></div>
    <div class="grid" id="grid-maybe"     style="display:none"></div>
    <div class="grid" id="grid-meh"       style="display:none"></div>
    <div class="grid" id="grid-banned"    style="display:none"></div>
  </main>

  <!-- Now Watching Widget -->
  <div id="nww" class="nww nww--idle">
    <!-- Idle button -->
    <button class="nww-idle-btn" id="nww-idle-btn">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/></svg>
    </button>

    <!-- Collapsed pill -->
    <div class="nww-pill" id="nww-pill">
      <div class="nww-pill-poster" id="nww-pill-poster"></div>
      <span class="nww-pill-title" id="nww-pill-title"></span>
      <span class="nww-pill-time" id="nww-pill-time"></span>
      <div class="nww-pill-bar"><div class="nww-pill-bar-fill" id="nww-pill-bar-fill"></div></div>
    </div>

    <!-- Expanded panel -->
    <div class="nww-panel" id="nww-panel">
      <!-- Search sub-panel -->
      <div class="nww-search" id="nww-search">
        <div class="nww-search-header">Pick a film</div>
        <input type="text" class="nww-search-input" id="nww-search-input" placeholder="Search by title…" autocomplete="off" spellcheck="false">
        <div class="nww-quick-picks" id="nww-quick-picks"></div>
        <div class="nww-search-results" id="nww-search-results"></div>
      </div>

      <!-- Playing / deciding sub-panel -->
      <div class="nww-playing" id="nww-playing">
        <div class="nww-poster-wrap" id="nww-poster-wrap">
          <img class="nww-poster" id="nww-poster" src="" alt="">
          <div class="nww-poster-glow"></div>
        </div>
        <div class="nww-title" id="nww-title"></div>
        <div class="nww-meta" id="nww-meta"></div>
        <div class="nww-progress-wrap" id="nww-progress-wrap">
          <div class="nww-progress-bar" id="nww-progress-bar">
            <div class="nww-progress-fill" id="nww-progress-fill"></div>
          </div>
          <div class="nww-time-row">
            <span id="nww-elapsed">0:00</span>
            <span id="nww-runtime">0:00</span>
          </div>
        </div>
        <div class="nww-controls" id="nww-controls">
          <button class="nww-btn nww-btn-pause" id="nww-pause-btn">Pause</button>
          <button class="nww-btn nww-btn-done" id="nww-done-btn">Done</button>
          <button class="nww-btn nww-btn-abandon" id="nww-abandon-btn">Abandon</button>
        </div>
        <div class="nww-decisions" id="nww-decisions" style="display:none">
          <div class="nww-decisions-label">How was it?</div>
          <button class="nww-dec-btn nww-dec-collection" id="nww-dec-collection">Collection</button>
          <button class="nww-dec-btn nww-dec-meh" id="nww-dec-meh">Meh</button>
          <button class="nww-dec-btn nww-dec-ban" id="nww-dec-ban">Don't Recommend</button>
        </div>
        <div class="nww-confirmation" id="nww-confirmation" style="display:none"></div>
      </div>
    </div>
  </div>

  <div id="search-modal-backdrop" class="search-modal-backdrop" style="display:none">
    <div class="search-modal">
      <div class="search-modal-header">
        <input type="text" id="search-input" class="search-input" placeholder="Search for a film…" autocomplete="off" spellcheck="false">
        <button class="search-modal-close" id="search-modal-close">✕</button>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>
  <div id="movie-modal-backdrop" class="movie-modal-backdrop" style="display:none">
    <button class="mm-nav-btn" id="mm-nav-prev">&#8592;</button>
    <div class="movie-modal" id="movie-modal">
      <button class="movie-modal-close" id="movie-modal-close">✕</button>
      <div class="mm-nav-counter" id="mm-nav-counter"></div>
      <div class="movie-modal-body" id="movie-modal-body"></div>
    </div>
    <button class="mm-nav-btn" id="mm-nav-next">&#8594;</button>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="movies-data.js"></script>
  <script src="auth.js"></script>
  <script src="movies-app.js"></script>
</body>
</html>
